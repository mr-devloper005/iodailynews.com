<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#ff7a00"/>
      <stop offset="100%" stop-color="#e03000"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8c00" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e63000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Glow halo (slightly larger, faded) -->
  <circle cx="32" cy="32" r="31" fill="url(#glow)"/>
  <!-- Main orange circle -->
  <circle cx="32" cy="32" r="24" fill="url(#bg)"/>
  <!-- "io" text -->
  <text x="32" y="39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1.5">io</text>
</svg>
